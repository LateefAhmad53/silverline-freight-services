<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bgFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2d46"/>
      <stop offset="55%" stop-color="#114f74"/>
      <stop offset="100%" stop-color="#2c8dbc"/>
    </linearGradient>
    <linearGradient id="cardLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#ecf5fb" stop-opacity="0.98"/>
    </linearGradient>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 56px; font-weight: 800; fill: #ffffff; }
      .subtitle { font-family: Arial, sans-serif; font-size: 26px; font-weight: 600; fill: #d8eef9; }
      .sectionTitle { font-family: Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0f4768; }
      .body { font-family: Arial, sans-serif; font-size: 26px; fill: #1f3d53; }
      .small { font-family: Arial, sans-serif; font-size: 22px; fill: #26506b; }
      .cta { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #ffffff; }
      .badge { font-family: Arial, sans-serif; font-size: 23px; font-weight: 700; fill: #0e4f73; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bgFront)"/>
  <circle cx="880" cy="170" r="240" fill="#68b6db" opacity="0.18"/>
  <circle cx="190" cy="1240" r="220" fill="#78c5e6" opacity="0.2"/>

  <rect x="70" y="70" width="940" height="185" rx="24" fill="#ffffff" opacity="0.1"/>
  <rect x="105" y="108" width="112" height="112" rx="20" fill="#d8eef9"/>
  <text x="129" y="179" class="badge">SL</text>

  <text x="245" y="162" class="title">SILVERLINE</text>
  <text x="245" y="208" class="subtitle">Freight Services</text>

  <rect x="70" y="290" width="940" height="880" rx="28" fill="url(#cardLight)"/>
  <text x="120" y="365" class="sectionTitle">Customer Portal Features</text>

  <g class="body">
    <text x="130" y="430">• Track orders instantly by tracking number</text>
    <text x="130" y="482">• Live shipment progress (0% to 100%)</text>
    <text x="130" y="534">• Clean shipment report view (route + item details)</text>
    <text x="130" y="586">• Hold alert visibility when charges apply</text>
    <text x="130" y="638">• Refundable processing-charge notice for clients</text>
    <text x="130" y="690">• Full Terms and Conditions on the frontend</text>
    <text x="130" y="742">• Mobile-friendly modern interface</text>
  </g>

  <rect x="120" y="790" width="840" height="220" rx="20" fill="#0f5b84"/>
  <text x="155" y="850" class="subtitle">Important Process Notice</text>
  <text x="155" y="900" class="small" fill="#e5f4fd">
    Processing charges may apply during security, clearance,
  </text>
  <text x="155" y="938" class="small" fill="#e5f4fd">
    and regulatory stages. These charges are temporary and
  </text>
  <text x="155" y="976" class="small" fill="#e5f4fd">
    fully refundable after successful delivery.
  </text>

  <rect x="220" y="1060" width="640" height="78" rx="16" fill="#0a3f5f"/>
  <text x="278" y="1111" class="cta">silverline-freight-services.online</text>

  <text x="310" y="1250" class="subtitle">Trusted logistics. Transparent delivery.</text>
</svg>
